spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/orderdb
    username: order
    password: order123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-events-consumer
      auto-offset-reset: earliest

server:
  port: 8082

outbox:
  publish-interval-ms: 5000
